name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        run: |
          HEADER_VERSION=$(grep -oP "Version:\s*\K.+" wp-omni-auth.php | head -1 | xargs)
          CONSTANT_VERSION=$(grep -oP "define\('WPOMNIAUTH_VERSION',\s*'\K[^']+" wp-omni-auth.php)
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"

          if [ "$HEADER_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Header version ($HEADER_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CONSTANT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Constant version ($CONSTANT_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Install gettext tools
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Compile translations
        run: |
          for po in languages/*.po; do
            if [ -f "$po" ]; then
              mo="${po%.po}.mo"
              echo "Compiling $po -> $mo"
              msgfmt -o "$mo" "$po"
            fi
          done

      - name: Build plugin ZIP
        run: |
          mkdir -p build/wp-omni-auth
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='docs' \
            --exclude='tests' \
            --exclude='tools' \
            --exclude='.gitignore' \
            --exclude='version.json' \
            --exclude='composer.*' \
            --exclude='phpunit.xml*' \
            ./ build/wp-omni-auth/
          # Remove markdown files (keep readme.txt if present)
          find build/wp-omni-auth -maxdepth 1 -name "*.md" -delete
          cd build && zip -r wp-omni-auth.zip wp-omni-auth/
          echo "ZIP contents:"
          unzip -l wp-omni-auth.zip | tail -1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WP-OmniAuth v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: build/wp-omni-auth.zip
          draft: false
          prerelease: false

      - name: Publish version.json to default branch
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Determine the repository's default branch (avoids hardcoding "main").
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null || echo "main")
          git fetch origin "$DEFAULT_BRANCH"
          # Force-switch so the working tree matches the branch exactly
          # (the translation-compile step above modified tracked .mo files).
          git checkout -f "$DEFAULT_BRANCH"

          # Pull the auto-generated release notes for the changelog field.
          NOTES=$(gh release view "v$VERSION" --json body -q '.body' 2>/dev/null || echo "")

          # JSON-escape NOTES into a single-line JSON string for version.json.
          # Priority: jq -> (sudo apt-get install jq) -> python3 -> empty string.
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y jq >/dev/null 2>&1 || true
          fi
          if command -v jq >/dev/null 2>&1; then
            CHANGELOG=$(printf '%s' "$NOTES" | jq -R -s .)
          elif command -v python3 >/dev/null 2>&1; then
            CHANGELOG=$(printf '%s' "$NOTES" | python3 -c 'import json,sys; sys.stdout.write(json.dumps(sys.stdin.read()))')
          else
            CHANGELOG='""'
          fi

          cat > version.json <<EOF
          {
            "version": "$VERSION",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/wp-omni-auth.zip",
            "details_url": "https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
            "requires": "6.0",
            "tested": "",
            "requires_php": "7.4",
            "changelog": $CHANGELOG
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump version.json to v$VERSION [skip ci]" || echo "version.json unchanged"
          git push origin "$DEFAULT_BRANCH"
